html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--fg-1);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
::selection{background:var(--teaching-accent-soft)}

.topbar-title{font-family:var(--font-headline);font-weight:600;font-size:15px;line-height:1.2}
.topbar-sub{font-size:11px;color:var(--fg-muted);margin-top:1px}

.wrap{max-width:900px;margin:0 auto;padding:0 20px}

.page-head{padding:40px 0 24px}

.page-head p{color:var(--fg-2);font-size:15px}

/* 搜索栏 */
.search-box{position:sticky;top:69px;z-index:40;padding:12px 0;background:var(--bg);margin-bottom:8px}

.search-input{

}
.search-input:focus{outline:none;border-color:var(--teaching-accent);box-shadow:0 0 0 3px var(--teaching-accent-soft)}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--fg-muted);font-size:16px;pointer-events:none}

/* 筛选条 */
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 16px}
.filter-chip{

.filter-chip:hover{border-color:var(--teaching-accent)}
.filter-chip.active{background:var(--teaching-accent);color:#fff;border-color:var(--teaching-accent)}

.paper-card{

.paper-num{

.paper-tag.cat-C{background:#f3e8ff;color:#6b21a8}
.paper-tag.cat-D{background:#dcfce7;color:#166534}
.paper-tag.cat-E{background:#fce7f3;color:#9d174d}
.paper-tag.star{background:#fef3c7;color:#92400e;font-weight:600}
.paper-link{display:inline-block;margin-top:8px;font-size:12.5px;color:var(--teaching-accent-deep);text-decoration:none;font-weight:500}

/* 空状态 */
.empty-state{text-align:center;padding:60px 20px;color:var(--fg-muted)}
.empty-state .emoji{font-size:40px;margin-bottom:12px;display:block}

/* 底部 */
footer{padding:32px 0 48px;text-align:center;border-top:1px solid var(--border)}

const CAT_NAMES = {A:'PBC麻木/危险因素',B:'复发/生存',C:'Meckel腔/解剖',D:'预测模型',E:'fMRI',F:'中枢机制',G:'GBTM方法',H:'量表方法'};

const list = document.getElementById('libList');
const searchInput = document.getElementById('searchInput');
const filterBar = document.getElementById('filterBar');
const resultCount = document.getElementById('resultCount');
const emptyState = document.getElementById('emptyState');

let currentCat = 'ALL';
let currentQuery = '';

function render(){
  const q = currentQuery.trim().toLowerCase();
  const filtered = PAPERS.filter(p => {
    const catOk = currentCat === 'ALL' || p.cat === currentCat;
    if(!catOk) return false;
    if(!q) return true;
    const hay = (p.title + ' ' + p.meta + ' ' + p.note).toLowerCase();
    return hay.includes(q);
  });

  list.innerHTML = filtered.map(p => `
    <article class="paper-card ${p.star?'is-star':''}">
      <div class="paper-head">
        <div class="paper-num">${p.n}</div>
        <div class="paper-title">${p.title}</div>
      </div>
      <div class="paper-meta">${p.meta}</div>
      <div style="font-size:13px;color:var(--fg-2);line-height:1.55">${p.note}</div>
      <div class="paper-tags">
        <span class="paper-tag cat-${p.cat}">${p.cat}·${CAT_NAMES[p.cat]}</span>
        ${p.star?'<span class="paper-tag star">⭐ 核心文献</span>':''}
        ${p.doi?`<span class="paper-tag">DOI: ${p.doi}</span>`:''}
      </div>
      <a class="paper-link" href="${p.url}" target="_blank" rel="noopener">查看原文 ↗</a>
    </article>
  `).join('');

  resultCount.textContent = currentCat === 'ALL'
    ? (q ? `匹配 ${filtered.length} / 50 篇` : `显示全部 ${filtered.length} 篇`)
    : (q ? `在 ${CAT_NAMES[currentCat]} 中匹配 ${filtered.length} 篇` : `${CAT_NAMES[currentCat]} · ${filtered.length} 篇`);

  emptyState.style.display = filtered.length === 0 ? 'block' : 'none';
  list.style.display = filtered.length === 0 ? 'none' : 'flex';
}

searchInput.addEventListener('input', e => { currentQuery = e.target.value; render(); });
filterBar.addEventListener('click', e => {
  const btn = e.target.closest('.filter-chip');
  if(!btn) return;
  filterBar.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
});

render();
</script>
